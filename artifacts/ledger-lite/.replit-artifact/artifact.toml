kind = "web"
previewPath = "/"
title = "LedgerLite"
version = "1.0.0"
id = "artifacts/ledger-lite"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22904

[services.development]
run = "pnpm --filter @workspace/ledger-lite run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ledger-lite", "run", "build" ]
publicDir = "artifacts/ledger-lite/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22904"
BASE_PATH = "/"
