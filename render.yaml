services:
  - type: web
    name: ledger-logic-api
    runtime: node
    rootDir: artifacts/api-server
    buildCommand: pnpm install --no-frozen-lockfile && pnpm run build
    startCommand: pnpm run start
    envVars:
      - key: NODE_ENV
        value: production

  - type: static
    name: ledger-logic-frontend
    buildCommand: npm install -g pnpm && pnpm install --no-frozen-lockfile && cd artifacts/ledger-lite && pnpm run build
    publishDir: artifacts/ledger-lite/dist
    envVars:
      - key: PNPM_VERSION
        value: "9.0.0"
