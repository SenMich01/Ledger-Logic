openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: LedgerLite API - Financial management for SMEs
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: transactions
    description: Income and expense transactions
  - name: customers
    description: Customer management
  - name: invoices
    description: Invoice management
  - name: debts
    description: Debt tracking
  - name: dashboard
    description: Dashboard summaries and analytics
  - name: reports
    description: Financial reports

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Dashboard
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get financial summary for dashboard
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [today, week, month]
            default: month
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/cash-flow:
    get:
      operationId: getCashFlow
      tags: [dashboard]
      summary: Get cash flow data for chart
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [week, month, year]
            default: month
      responses:
        "200":
          description: Cash flow chart data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashFlowData"

  /dashboard/recent-transactions:
    get:
      operationId: getDashboardRecentTransactions
      tags: [dashboard]
      summary: Get recent transactions for dashboard
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 5
      responses:
        "200":
          description: Recent transactions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  # Transactions
  /transactions:
    get:
      operationId: listTransactions
      tags: [transactions]
      summary: List all transactions
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [income, expense]
        - name: category
          in: query
          schema:
            type: string
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionList"
    post:
      operationId: createTransaction
      tags: [transactions]
      summary: Create a new transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransactionBody"
      responses:
        "201":
          description: Created transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /transactions/{id}:
    get:
      operationId: getTransaction
      tags: [transactions]
      summary: Get a transaction by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transaction details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "404":
          description: Not found
    put:
      operationId: updateTransaction
      tags: [transactions]
      summary: Update a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTransactionBody"
      responses:
        "200":
          description: Updated transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
    delete:
      operationId: deleteTransaction
      tags: [transactions]
      summary: Delete a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Customers
  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List all customers
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerList"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a new customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerBody"
      responses:
        "201":
          description: Created customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get a customer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerDetail"
        "404":
          description: Not found
    put:
      operationId: updateCustomer
      tags: [customers]
      summary: Update a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCustomerBody"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Invoices
  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: List all invoices
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [paid, pending, overdue]
        - name: customerId
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceList"
    post:
      operationId: createInvoice
      tags: [invoices]
      summary: Create a new invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceBody"
      responses:
        "201":
          description: Created invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      summary: Get an invoice by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "404":
          description: Not found
    put:
      operationId: updateInvoice
      tags: [invoices]
      summary: Update an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInvoiceBody"
      responses:
        "200":
          description: Updated invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
    delete:
      operationId: deleteInvoice
      tags: [invoices]
      summary: Delete an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /invoices/{id}/mark-paid:
    post:
      operationId: markInvoicePaid
      tags: [invoices]
      summary: Mark invoice as paid
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  # Debts
  /debts:
    get:
      operationId: listDebts
      tags: [debts]
      summary: List all outstanding debts
      parameters:
        - name: customerId
          in: query
          schema:
            type: integer
        - name: aging
          in: query
          schema:
            type: string
            enum: [current, overdue_7, overdue_30, overdue_60]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of debts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebtList"
    post:
      operationId: createDebt
      tags: [debts]
      summary: Create a new debt record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDebtBody"
      responses:
        "201":
          description: Created debt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Debt"

  /debts/{id}:
    get:
      operationId: getDebt
      tags: [debts]
      summary: Get a debt record by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Debt details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Debt"
        "404":
          description: Not found
    put:
      operationId: updateDebt
      tags: [debts]
      summary: Update a debt record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDebtBody"
      responses:
        "200":
          description: Updated debt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Debt"
    delete:
      operationId: deleteDebt
      tags: [debts]
      summary: Delete a debt record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /debts/{id}/mark-paid:
    post:
      operationId: markDebtPaid
      tags: [debts]
      summary: Mark a debt as paid
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated debt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Debt"

  /debts/summary:
    get:
      operationId: getDebtSummary
      tags: [debts]
      summary: Get debt aging summary
      responses:
        "200":
          description: Debt summary by aging bucket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebtSummary"

  # Reports
  /reports/profit-loss:
    get:
      operationId: getProfitLossReport
      tags: [reports]
      summary: Get profit and loss report
      parameters:
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: P&L report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfitLossReport"

  /reports/expense-breakdown:
    get:
      operationId: getExpenseBreakdown
      tags: [reports]
      summary: Get expense breakdown by category
      parameters:
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Expense breakdown by category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryBreakdown"

  /reports/revenue-breakdown:
    get:
      operationId: getRevenueBreakdown
      tags: [reports]
      summary: Get revenue breakdown by category
      parameters:
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Revenue breakdown by category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryBreakdown"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # Transaction schemas
    Transaction:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [income, expense]
        amount:
          type: number
        category:
          type: string
        description:
          type: string
        paymentMethod:
          type: string
          enum: [cash, bank, pos, transfer]
        date:
          type: string
          format: date-time
        customerId:
          type: integer
          nullable: true
        customerName:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, type, amount, category, paymentMethod, date, createdAt, updatedAt]

    TransactionList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [data, total, page, limit]

    CreateTransactionBody:
      type: object
      properties:
        type:
          type: string
          enum: [income, expense]
        amount:
          type: number
        category:
          type: string
        description:
          type: string
        paymentMethod:
          type: string
          enum: [cash, bank, pos, transfer]
        date:
          type: string
          format: date-time
        customerId:
          type: integer
          nullable: true
      required: [type, amount, category, paymentMethod, date]

    UpdateTransactionBody:
      type: object
      properties:
        type:
          type: string
          enum: [income, expense]
        amount:
          type: number
        category:
          type: string
        description:
          type: string
        paymentMethod:
          type: string
          enum: [cash, bank, pos, transfer]
        date:
          type: string
          format: date-time
        customerId:
          type: integer
          nullable: true

    # Customer schemas
    Customer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        totalPurchases:
          type: number
        outstandingBalance:
          type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, totalPurchases, outstandingBalance, createdAt, updatedAt]

    CustomerDetail:
      allOf:
        - $ref: "#/components/schemas/Customer"
        - type: object
          properties:
            recentTransactions:
              type: array
              items:
                $ref: "#/components/schemas/Transaction"
            activeDebts:
              type: array
              items:
                $ref: "#/components/schemas/Debt"

    CustomerList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Customer"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [data, total, page, limit]

    CreateCustomerBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
      required: [name]

    UpdateCustomerBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        address:
          type: string
          nullable: true

    # Invoice schemas
    InvoiceItem:
      type: object
      properties:
        description:
          type: string
        quantity:
          type: number
        unitPrice:
          type: number
        total:
          type: number
      required: [description, quantity, unitPrice, total]

    Invoice:
      type: object
      properties:
        id:
          type: integer
        invoiceNumber:
          type: string
        customerId:
          type: integer
        customerName:
          type: string
        status:
          type: string
          enum: [paid, pending, overdue]
        items:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceItem"
        subtotal:
          type: number
        total:
          type: number
        dueDate:
          type: string
          format: date-time
        paidAt:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, invoiceNumber, customerId, customerName, status, items, subtotal, total, dueDate, createdAt, updatedAt]

    InvoiceList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Invoice"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [data, total, page, limit]

    CreateInvoiceBody:
      type: object
      properties:
        customerId:
          type: integer
        items:
          type: array
          items:
            type: object
            properties:
              description:
                type: string
              quantity:
                type: number
              unitPrice:
                type: number
            required: [description, quantity, unitPrice]
        dueDate:
          type: string
          format: date-time
        notes:
          type: string
          nullable: true
      required: [customerId, items, dueDate]

    UpdateInvoiceBody:
      type: object
      properties:
        customerId:
          type: integer
        items:
          type: array
          items:
            type: object
            properties:
              description:
                type: string
              quantity:
                type: number
              unitPrice:
                type: number
            required: [description, quantity, unitPrice]
        dueDate:
          type: string
          format: date-time
        status:
          type: string
          enum: [paid, pending, overdue]
        notes:
          type: string
          nullable: true

    # Debt schemas
    Debt:
      type: object
      properties:
        id:
          type: integer
        customerId:
          type: integer
        customerName:
          type: string
        amount:
          type: number
        amountPaid:
          type: number
        balance:
          type: number
        description:
          type: string
          nullable: true
        dueDate:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [active, paid, partial]
        agingDays:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, customerId, customerName, amount, amountPaid, balance, status, agingDays, createdAt, updatedAt]

    DebtList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Debt"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [data, total, page, limit]

    CreateDebtBody:
      type: object
      properties:
        customerId:
          type: integer
        amount:
          type: number
        description:
          type: string
          nullable: true
        dueDate:
          type: string
          format: date-time
          nullable: true
      required: [customerId, amount]

    UpdateDebtBody:
      type: object
      properties:
        amount:
          type: number
        amountPaid:
          type: number
        description:
          type: string
          nullable: true
        dueDate:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [active, paid, partial]

    DebtSummary:
      type: object
      properties:
        totalOutstanding:
          type: number
        current:
          type: number
        overdue7Days:
          type: number
        overdue30Days:
          type: number
        overdue60Days:
          type: number
        totalDebtors:
          type: integer
      required: [totalOutstanding, current, overdue7Days, overdue30Days, overdue60Days, totalDebtors]

    # Dashboard schemas
    DashboardSummary:
      type: object
      properties:
        totalRevenue:
          type: number
        totalExpenses:
          type: number
        profit:
          type: number
        profitMargin:
          type: number
        outstandingDebts:
          type: number
        pendingInvoices:
          type: integer
        recentTransactionCount:
          type: integer
        period:
          type: string
      required: [totalRevenue, totalExpenses, profit, profitMargin, outstandingDebts, pendingInvoices, recentTransactionCount, period]

    CashFlowPoint:
      type: object
      properties:
        date:
          type: string
        income:
          type: number
        expense:
          type: number
        net:
          type: number
      required: [date, income, expense, net]

    CashFlowData:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CashFlowPoint"
        period:
          type: string
      required: [data, period]

    # Report schemas
    ProfitLossReport:
      type: object
      properties:
        totalRevenue:
          type: number
        totalExpenses:
          type: number
        grossProfit:
          type: number
        profitMargin:
          type: number
        revenueByCategory:
          type: array
          items:
            $ref: "#/components/schemas/CategoryBreakdown"
        expenseByCategory:
          type: array
          items:
            $ref: "#/components/schemas/CategoryBreakdown"
        startDate:
          type: string
        endDate:
          type: string
      required: [totalRevenue, totalExpenses, grossProfit, profitMargin, revenueByCategory, expenseByCategory, startDate, endDate]

    CategoryBreakdown:
      type: object
      properties:
        category:
          type: string
        amount:
          type: number
        percentage:
          type: number
        count:
          type: integer
      required: [category, amount, percentage, count]
